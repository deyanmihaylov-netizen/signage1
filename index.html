<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #0b1220;
  color: white;
  font-family: Arial;
  overflow: hidden;
}

#clock {
  font-size: 90px;
  font-weight: bold;
}

#date {
  font-size: 30px;
}

#weather {
  position: absolute;
  top: 30px;
  right: 40px;
  font-size: 28px;
}

#logo {
  position: absolute;
  top: 20px;
  left: 20px;
  height: 120px;
}

#gallery {
  position: absolute;
  top: 180px;
  width: 100%;
  height: 55%;
}

#gallery iframe {
  width: 100%;
  height: 100%;
  border: none;
}

#ticker {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: #111827;
  padding: 15px 0;
}

#ticker-text {
  white-space: nowrap;
  display: inline-block;
  animation: scroll 20s linear infinite;
  font-size: 32px;
}

@keyframes scroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

.container {
  padding: 150px 40px 40px 40px;
}
</style>
</head>

<body>

<img id="logo" src="logo.png">

<div class="container">
  <div id="clock"></div>
  <div id="date"></div>
</div>

<div id="weather">Зареждане...</div>

<div id="gallery">
  <iframe src="https://klimentvarna.com"></iframe>
</div>

<div id="ticker">
  <div id="ticker-text">📢 Добре дошли в СУ "Св. Климент Охридски"</div>
</div>

<script>
function updateClock() {
  const now = new Date();

  document.getElementById('clock').innerText =
    now.toLocaleTimeString('bg-BG', {hour: '2-digit', minute: '2-digit'});

  document.getElementById('date').innerText =
    now.toLocaleDateString('bg-BG', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
}

setInterval(updateClock, 1000);
updateClock();

fetch('https://wttr.in/Varna?format=3')
  .then(r => r.text())
  .then(t => document.getElementById('weather').innerText = t)
  .catch(() => document.getElementById('weather').innerText = "Няма данни");
</script>

</body>
</html>
